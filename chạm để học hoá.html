        .g15 { border-bottom: 6px solid #81c784; }
        .g16 { border-bottom: 6px solid #ffb74d; }
        .g17 { border-bottom: 6px solid #e57373; }
        .g18 { border-bottom: 6px solid #7986cb; }
        .f-block { background: #e8f5e9 !important; border-bottom: 6px solid #66bb6a; }

]
        const container = document.getElementById('ptable');
        const modal = document.getElementById('modal');
        function getGroupClass(g) {
            if (g === 1) return 'g1';
            if (g === 2) return 'g2';
            if (g >= 3 && g <= 12) return 'g3to12';
            if (g >= 13 && g <= 18) return `g${g}`;
            return 'g3to12';
        }
        function renderTable(filter = '') {
            container.innerHTML = '';
            elements.forEach(el => {
                const term = filter.toLowerCase();
                if (term && !el.name.toLowerCase().includes(term) && 
                    !el.s.toLowerCase().includes(term) && 
                    !el.n.toString().includes(term)) return;

                const cell = document.createElement('div');
                cell.className = `cell ${getGroupClass(el.g)}`;
                if ((el.n >= 57 && el.n <= 71) || (el.n >= 89 && el.n <= 103)) {
                    cell.classList.add('f-block');
                }
                let row = el.p;
                let col = el.g;
                if (el.n >= 57 && el.n <= 71) { row = 8; col = el.n - 56 + 2; }
                else if (el.n >= 89 && el.n <= 103) { row = 9; col = el.n - 88 + 2; }
                cell.style.gridColumn = col;
                cell.style.gridRow = row;
                cell.innerHTML = `
                    <span class="num">${el.n}</span>
                    <span class="sym">${el.s}</span>
                    <span class="mass">${el.m}</span>
                `;
                cell.onclick = () => showModal(el);
                container.appendChild(cell);
            });
        }
        function showModal(el) {
            document.getElementById('modalTitle').innerHTML = `${el.name} <small style="font-size:0.7em">(${el.s})</small>`;
            document.getElementById('mNum').textContent = el.n;
            document.getElementById('mSym').textContent = el.s;
            document.getElementById('mName').textContent = el.name;
            document.getElementById('mMass').textContent = el.m;
            document.getElementById('mGroup').textContent = el.g;
            document.getElementById('mPeriod').textContent = el.p;
            document.getElementById('mMelt').textContent = el.mp || '—';
            document.getElementById('mBoil').textContent = el.bp || '—';
            document.getElementById('mConfig').textContent = el.c || '—';
            document.getElementById('mPhysical').textContent = el.physical || '—';
            document.getElementById('mChemical').textContent = el.chemical || '—';
            document.getElementById('mDesc').textContent = el.d || 'Chưa có mô tả chi tiết.';
            modal.style.display = 'block';
        }
        function closeModal() {
            modal.style.display = 'none';
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderTable(e.target.value.trim());
        });
        renderTable();
    </script>
